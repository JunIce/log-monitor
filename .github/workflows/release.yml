name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          go build -o log-server.exe -ldflags "-s -w" .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: log-server.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}