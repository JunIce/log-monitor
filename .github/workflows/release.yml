name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build for Windows
        run: |
          go build -o log-server-windows-amd64.exe -ldflags "-s -w" .
        env:
          GOOS: windows
          GOARCH: amd64

      - name: Build for Linux
        run: |
          go build -o log-server-linux-amd64 -ldflags "-s -w" .
        env:
          GOOS: linux
          GOARCH: amd64

      - name: Build for macOS
        run: |
          go build -o log-server-darwin-amd64 -ldflags "-s -w" .
        env:
          GOOS: darwin
          GOARCH: amd64

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            log-server-windows-amd64.exe
            log-server-linux-amd64
            log-server-darwin-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}